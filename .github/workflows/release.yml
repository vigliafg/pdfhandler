name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            arch: 'aarch64'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            arch: 'x86_64'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            arch: 'amd64'
            args: ''
          - platform: 'windows-latest'
            arch: 'amd64'
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ contains(matrix.platform, 'macos') && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Set CPU compatibility flags (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: echo "RUSTFLAGS=-C target-cpu=x86-64" >> $GITHUB_ENV

      - name: Tauri Build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'PDF Toolkit ${{ github.ref_name }}'
          releaseBody: |
            ## PDF Toolkit ${{ github.ref_name }}

            ### Download
            - **Windows**: `.msi` or `.exe` installer
            - **macOS (Apple Silicon)**: `.dmg` (aarch64)
            - **macOS (Intel)**: `.dmg` (x86_64)
            - **Linux**: `.deb` or `.AppImage`

            ### Features
            - Merge, split, extract, rotate, reorder PDF pages
            - Add/delete pages, insert/replace content
            - Table of contents (TOC) preservation
            - Full offline support — no internet required
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
