name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            target: 'mac'
            arch: 'arm64'
          - platform: 'macos-13'
            target: 'mac'
            arch: 'x64'
          - platform: 'ubuntu-22.04'
            target: 'linux'
            arch: 'x64'
          - platform: 'windows-latest'
            target: 'win'
            arch: 'x64'

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgbm-dev libasound2-dev

      - name: Install dependencies
        run: npm ci

      - name: Build frontend + Electron main process
        run: npm run build

      - name: Package with electron-builder
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --${{ matrix.target }} --${{ matrix.arch }} --publish never

      - name: Draft Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: 'pdfhandler ${{ github.ref_name }}'
          body: |
            ## pdfhandler ${{ github.ref_name }}

            ### Download
            - **Windows**: `.exe` installer
            - **macOS (Apple Silicon)**: `.dmg` (arm64)
            - **macOS (Intel)**: `.dmg` (x64)
            - **Linux**: `.AppImage` and `.deb`

            ### Features
            - Merge, split, extract, rotate, reorder PDF pages
            - Add/delete pages, insert/replace content
            - Table of contents (TOC) preservation
            - Full offline support — no internet required
          files: |
            release/*.dmg
            release/*.AppImage
            release/*.deb
            release/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
